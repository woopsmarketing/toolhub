    - 과세 구분(일반/세금우대/비과세)을 선택하고 "계산하기"를 누르세요.
  en:
    - Enter your monthly deposit amount (KRW).
    - Enter the annual interest rate (%) and term (months).
    - Pick a tax bracket (standard/preferential/exempt) and click "Calculate".

