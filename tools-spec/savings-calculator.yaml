faq:
  ko:
    - q: 적금 단리와 복리의 차이는 무엇인가요?
      a: 적금 단리는 매월 납입한 금액에 대해 잔여 개월 기준으로 이자를 계산합니다. 적금 복리(월복리)는 매달 발생한 이자를 다음 달 원금에 합산해 다시 이자를 계산하므로 같은 금리에서도 만기 수령액이 더 큽니다. 한국 시중은행은 대부분 단리이며, 복리 적금은 일부 인터넷·저축은행 상품에서만 제공합니다.
    - q: 이자에 세금이 얼마나 붙나요?
      a: 이자소득세는 일반과세 15.4%(소득세 14% + 지방세 1.4%), 세금우대 9.5%(상호금융 등), 비과세 0% 세 가지로 구분됩니다. 적금 이자 계산기는 세 가지를 모두 계산해 비교하기 쉽도록 결과를 함께 보여줍니다.
    - q: 비과세 적금은 누가 가입할 수 있나요?
      a: 만 65세 이상, 장애인, 독립유공자 등 자격 요건을 만족하는 경우 1인당 합산 5천만 원 한도 내에서 비과세 종합저축 가입이 가능합니다. 일반인은 새마을금고·신협·수협 등의 세금우대 상품(9.5%, 한도 3천만 원)을 활용할 수 있습니다.
    - q: 입력한 금액이 서버로 전송되나요?
      a: 아니오, 적금 이자 계산기는 입력값을 어떤 서버로도 전송하지 않습니다. 모든 계산은 사용자의 브라우저 내에서만 수행됩니다.
  en:
    - q: What is the difference between simple and compound interest in Korean savings?
      a: Simple interest computes interest on each monthly deposit based on remaining months. Compound (monthly) interest adds the interest from each month back into principal, so the maturity amount is larger for the same rate. Most Korean banks offer simple-interest savings; compound is mostly seen at internet or savings banks.
    - q: How is the tax on interest computed?
      a: Korean savings interest tax is one of three brackets: standard 15.4% (14% income + 1.4% local), preferential 9.5% (mutual finance, etc.), and exempt 0%. The calculator shows all three so you can compare side by side.
    - q: Who qualifies for the exempt bracket (0%)?
      a: People aged 65+, disabled persons, and certain merit holders may use 비과세 종합저축 up to a combined 50M KRW. General residents can instead use preferential 9.5% products at 새마을금고/신협/수협 (cap 30M KRW).
    - q: Are my inputs sent to a server?
      a: No, Savings Calculator never sends your numbers anywhere. All calculations run inside your browser.

guide:
  ko:
    title: 적금 이자 계산기 사용 가이드
    content: |
      적금 이자 계산기는 한국식 정기 적금의 만기 수령액과 세후 이자를 즉시 산출하는 도구입니다.
      월 납입액, 연이율, 기간(개월), 과세 구분을 입력하면 단리·복리 두 가지 결과를 한 번에 보여줍니다.

      계산 공식은 다음과 같습니다.
      • 단리 이자 = 월납입액 × (연이율 / 12) × n(n+1) / 2  (n = 개월 수)
      • 복리 만기액 = 월납입액 × [(1 + r/12)^n - 1] / (r/12)  (r = 연이율, 소수)
      • 세후 이자 = 세전 이자 × (1 - 세율)

      세율은 일반과세 15.4%, 세금우대 9.5%, 비과세 0%를 지원합니다. 계산 결과는 원금 합계,
      세전 이자, 세후 이자, 만기 수령액 4가지로 표시되며 모두 브라우저 내에서 즉시 산출됩니다.
  en:
    title: Korean Savings Calculator Guide
    content: |
      Savings Calculator estimates the maturity amount and after-tax interest of Korean
      installment-style savings accounts. Enter monthly deposit, annual interest rate, term
      in months, and tax bracket; the tool returns both simple and compound results.

      Formulas used:
      • Simple interest = monthly × (rate / 12) × n(n+1) / 2  (n = months)
      • Compound maturity = monthly × [(1 + r/12)^n - 1] / (r/12)  (r = annual rate)
      • After-tax interest = pre-tax interest × (1 - tax rate)

      Tax brackets supported: standard 15.4%, preferential 9.5%, exempt 0%. Output includes
      total principal, pre-tax interest, after-tax interest, and maturity amount, all
      computed instantly in your browser.

inputConfig:
  outputType: stats

formFields:
  - name: monthly
    label: 월 납입액 (원)
    type: number
    defaultValue: 300000
    min: 0
    suffix: 원
  - name: rate
    label: 연이율 (%)
    type: number
    defaultValue: 4
    min: 0
    step: 0.01
    suffix: "%"
  - name: months
    label: 가입 기간 (개월)
    type: number
    defaultValue: 12
    min: 1
    suffix: 개월
  - name: taxBracket
    label: 과세 구분
    type: select
    defaultValue: standard
    options:
      - { label: "일반과세 (15.4%)", value: "standard" }
      - { label: "세금우대 (9.5%)", value: "preferential" }
      - { label: "비과세 (0%)", value: "exempt" }

resultLabels:
  - { key: "principal", label: "원금 합계", suffix: "원" }
  - { key: "simpleInterest", label: "단리 세전 이자", suffix: "원" }
  - { key: "simpleAfterTax", label: "단리 세후 이자", suffix: "원" }
  - { key: "simpleMaturity", label: "단리 만기 수령액", suffix: "원" }
  - { key: "compoundInterest", label: "복리 세전 이자", suffix: "원" }
  - { key: "compoundAfterTax", label: "복리 세후 이자", suffix: "원" }
  - { key: "compoundMaturity", label: "복리 만기 수령액", suffix: "원" }

