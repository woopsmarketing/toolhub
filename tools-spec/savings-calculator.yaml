    - 일반과세 15.4% / 세금우대 9.5% / 비과세 0% 세 가지 과세 구분 지원
    - 월 단위 납입을 정확히 계산 (한국 적금 표준 공식 적용)
    - 월 납입액·연이율·기간만 입력하면 즉시 결과 (로그인·회원가입 불필요)
    - 모든 계산은 브라우저 내에서 처리 (입력값이 외부로 전송되지 않음)
