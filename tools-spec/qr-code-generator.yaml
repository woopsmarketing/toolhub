    - title: Wi-Fi 비밀번호·이벤트 URL 공유
      description: 카페·전시회에서 Wi-Fi 정보나 이벤트 페이지 URL을 손쉽게 공유할 수 있습니다.
  en:
    - title: Adding URL QR to business cards & flyers
